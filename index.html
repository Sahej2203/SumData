<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Values After =</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 10px;
        }

        .container {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
            font-size: 18px;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            font-size: 16px;
        }

        pre {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }

        .total-box {
            margin-top: 10px;
        }

        .total-box input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 2px solid #007bff;
            text-align: center;
            font-weight: bold;
            background: #e9f2ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Extract Numbers</h2>

    <textarea id="inputData" placeholder="Paste WhatsApp data here..."></textarea>

    <button onclick="extractNumbers()">Extract</button>

    <pre id="output">Output will appear here...</pre>

    <div class="total-box">
        <input type="text" id="total" placeholder="Total will appear here" readonly>
    </div>
</div>

<script>
function extractNumbers() {
    const input = document.getElementById("inputData").value;

    const result = input
        .split('\n')
        .map(line => line.trim())
        .filter(line => line.includes('='))
        .map(line => line.split('=')[1]?.trim())
        .filter(value => value && !isNaN(value))
        .map(Number);

    const sum = result.reduce((acc, val) => acc + val, 0);

    // show extracted numbers
    document.getElementById("output").textContent = result.join('\n');

    // show total in separate box
    document.getElementById("total").value = sum;
}
</script>

</body>
</html>
